<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi lista de pelis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #12100e;
        --panel: #1c1916;
        --line: #332c26;
        --text: #f3ede4;
        --muted: #a9a094;
        --gold: #e7b54a;
        --gold-soft: #f0cd7e;
        --danger: #c8553d;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background:
          radial-gradient(
            1200px 500px at 50% -200px,
            #2a231c 0%,
            transparent 70%
          ),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 32px 16px 64px;
        line-height: 1.5;
      }
      .wrap {
        max-width: 680px;
        margin: 0 auto;
      }
      header {
        text-align: center;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 26px 20px 22px;
        background: linear-gradient(180deg, #211c17, #181410);
        box-shadow:
          0 0 0 4px #0d0b09,
          0 20px 40px -24px #000;
        margin-bottom: 28px;
      }
      .bulbs {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .bulb {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--gold);
        box-shadow: 0 0 8px var(--gold-soft);
        animation: glow 1.6s infinite alternate;
      }
      .bulb:nth-child(2) {
        animation-delay: 0.2s;
      }
      .bulb:nth-child(3) {
        animation-delay: 0.4s;
      }
      .bulb:nth-child(4) {
        animation-delay: 0.6s;
      }
      .bulb:nth-child(5) {
        animation-delay: 0.8s;
      }
      @keyframes glow {
        from {
          opacity: 0.35;
        }
        to {
          opacity: 1;
        }
      }
      h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(40px, 9vw, 68px);
        letter-spacing: 2px;
        line-height: 0.95;
        color: var(--gold-soft);
        text-shadow: 0 2px 0 #000;
      }
      header p {
        color: var(--muted);
        font-size: 14px;
        margin-top: 6px;
      }
      .add {
        display: grid;
        grid-template-columns: 1fr 150px;
        gap: 10px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 14px;
      }
      .add input,
      .add select,
      .add button {
        font: inherit;
        border-radius: 9px;
        border: 1px solid var(--line);
        padding: 12px 14px;
        background: #15120f;
        color: var(--text);
      }
      .add input:focus,
      .add select:focus {
        outline: 2px solid var(--gold);
      }
      .add button {
        grid-column: 1 / -1;
        cursor: pointer;
        font-weight: 600;
        background: var(--gold);
        color: #1a1510;
        border: none;
        transition: filter 0.15s;
      }
      .add button:hover {
        filter: brightness(1.08);
      }
      .add button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .count {
        color: var(--muted);
        font-size: 13px;
        margin: 18px 4px 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .card {
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-left: 4px solid var(--tag, #555);
        border-radius: 11px;
        padding: 14px 16px;
        margin-bottom: 10px;
      }
      .card .title {
        font-weight: 600;
        font-size: 16px;
      }
      .card .meta {
        flex: 1;
        min-width: 0;
      }
      .tag {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 999px;
        margin-top: 5px;
        background: var(--tag, #555);
        color: #16120e;
        letter-spacing: 0.3px;
      }
      .del {
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        font: inherit;
        transition: 0.15s;
      }
      .del:hover {
        border-color: var(--danger);
        color: var(--danger);
      }
      .empty,
      .loading {
        text-align: center;
        color: var(--muted);
        padding: 40px 20px;
        border: 1px dashed var(--line);
        border-radius: 12px;
      }
      .empty strong {
        color: var(--text);
        display: block;
        margin-bottom: 4px;
        font-size: 17px;
      }
      .error {
        background: #2a1714;
        border: 1px solid var(--danger);
        color: #f0bfb4;
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 14px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="bulbs">
          <span class="bulb"></span><span class="bulb"></span>
          <span class="bulb"></span><span class="bulb"></span
          ><span class="bulb"></span>
        </div>
        <h1>Mi lista de pelis</h1>
        <p>Lo que quiero ver — guardado en AWS</p>
      </header>

      <div id="msg"></div>

      <div class="add">
        <input
          id="titulo"
          type="text"
          placeholder="Título de la película o serie"
          maxlength="80"
        />
        <select id="genero">
          <option value="Ciencia ficción">Ciencia ficción</option>
          <option value="Terror">Terror</option>
          <option value="Comedia">Comedia</option>
          <option value="Drama">Drama</option>
          <option value="Acción">Acción</option>
          <option value="Romance">Romance</option>
          <option value="Documental">Documental</option>
          <option value="Animación">Animación</option>
        </select>
        <button id="addBtn">Agregar a la lista</button>
      </div>

      <div class="count" id="count">Cargando…</div>
      <div id="list"></div>
    </div>

    <script>
      // ⬇️ TU API ACÁ (la URL base, SIN /pelis al final)
      const API_BASE = "https://cqv2d7raa3.execute-api.us-east-1.amazonaws.com";

      const GENRE_COLORS = {
        "Ciencia ficción": "#6cb8e6",
        Terror: "#c8553d",
        Comedia: "#e7b54a",
        Drama: "#b98ce0",
        Acción: "#e2674a",
        Romance: "#e68bb0",
        Documental: "#7fc8a9",
        Animación: "#8ad15c",
        general: "#9a9088",
      };
      const colorFor = (g) => GENRE_COLORS[g] || "#9a9088";
      const $ = (id) => document.getElementById(id);
      const listEl = $("list"),
        countEl = $("count"),
        msgEl = $("msg");

      function showError(t) {
        msgEl.innerHTML = `<div class="error">${t}</div>`;
      }
      function clearError() {
        msgEl.innerHTML = "";
      }

      async function cargarPelis() {
        listEl.innerHTML = `<div class="loading">Cargando tu lista…</div>`;
        countEl.textContent = "";
        try {
          const res = await fetch(`${API_BASE}/pelis`);
          if (!res.ok) throw new Error("status " + res.status);
          const pelis = await res.json();
          render(pelis);
          clearError();
        } catch (e) {
          listEl.innerHTML = "";
          countEl.textContent = "";
          showError(
            "No pude cargar la lista. Revisá que la API esté funcionando.",
          );
          console.error(e);
        }
      }

      function render(pelis) {
        if (!pelis.length) {
          countEl.textContent = "";
          listEl.innerHTML = `<div class="empty"><strong>Todavía no hay nada acá</strong>
        Agregá la primera película que quieras ver.</div>`;
          return;
        }
        countEl.textContent = `${pelis.length} ${pelis.length === 1 ? "película" : "películas"} en la lista`;
        listEl.innerHTML = pelis
          .map((p) => {
            const color = colorFor(p.genero);
            return `<div class="card" style="--tag:${color}">
        <div class="meta">
          <div class="title">${escapeHtml(p.titulo)}</div>
          <span class="tag">${escapeHtml(p.genero || "general")}</span>
        </div>
        <button class="del" data-id="${p.id}">Borrar</button>
      </div>`;
          })
          .join("");
        document.querySelectorAll(".del").forEach((btn) => {
          btn.addEventListener("click", () => borrarPeli(btn.dataset.id, btn));
        });
      }

      async function agregarPeli() {
        const titulo = $("titulo").value.trim();
        const genero = $("genero").value;
        if (!titulo) {
          $("titulo").focus();
          return;
        }
        const btn = $("addBtn");
        btn.disabled = true;
        btn.textContent = "Agregando…";
        try {
          const res = await fetch(`${API_BASE}/pelis`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ titulo, genero }),
          });
          if (!res.ok) throw new Error("status " + res.status);
          $("titulo").value = "";
          await cargarPelis();
          clearError();
        } catch (e) {
          showError("No pude agregar la película. Probá de nuevo.");
          console.error(e);
        } finally {
          btn.disabled = false;
          btn.textContent = "Agregar a la lista";
          $("titulo").focus();
        }
      }

      async function borrarPeli(id, btn) {
        btn.disabled = true;
        btn.textContent = "…";
        try {
          const res = await fetch(`${API_BASE}/pelis/${id}`, {
            method: "DELETE",
          });
          if (!res.ok) throw new Error("status " + res.status);
          await cargarPelis();
          clearError();
        } catch (e) {
          showError("No pude borrar la película. Probá de nuevo.");
          btn.disabled = false;
          btn.textContent = "Borrar";
          console.error(e);
        }
      }

      function escapeHtml(s) {
        return String(s).replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }

      $("addBtn").addEventListener("click", agregarPeli);
      $("titulo").addEventListener("keydown", (e) => {
        if (e.key === "Enter") agregarPeli();
      });
      cargarPelis();
    </script>
  </body>
</html>
